<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página não encontrada — RADAR UFC</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="../assets/images/logo-mark.svg" />
    <link rel="stylesheet" href="../css/main.css" />
    <script>
      try {
        var stored = JSON.parse(localStorage.getItem("radar.theme"));
        document.documentElement.dataset.theme =
          stored ||
          (matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
      } catch (error) {}
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">Pular para o conteúdo</a>
    <div class="page">
      <div data-shell="header"></div>
      <main class="page__main" id="main">
        <section class="section">
          <div class="container container--narrow">
            <div class="empty-state">
              <svg class="icon empty-state__icon" aria-hidden="true" focusable="false">
                <use href="../assets/icons/sprite.svg#icon-alert"></use>
              </svg>
              <h1 class="empty-state__title">Página não encontrada</h1>
              <p class="empty-state__text">
                O endereço acessado não existe ou foi movido.
              </p>
              <div class="cluster">
                <a class="btn btn--primary" href="index.html">Ir para o início</a>
                <a class="btn btn--ghost" href="manifestacoes.html">Ver manifestações</a>
              </div>
            </div>
          </div>
        </section>
      </main>
      <div data-shell="footer"></div>
    </div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>

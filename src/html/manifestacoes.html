<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manifestações — RADAR UFC</title>
    <meta
      name="description"
      content="Listagem pública de manifestações registradas no RADAR UFC, com busca e filtros."
    />
    <link rel="icon" href="../assets/images/logo-mark.svg" />
    <link rel="stylesheet" href="../css/main.css" />
    <script>
      try {
        var stored = JSON.parse(localStorage.getItem("radar.theme"));
        document.documentElement.dataset.theme =
          stored ||
          (matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
      } catch (error) {}
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">Pular para o conteúdo</a>
    <div class="page">
      <div data-shell="header"></div>
      <main class="page__main" id="main">
        <section class="section">
          <div class="container stack stack--loose">
            <header class="stack stack--tight">
              <p class="eyebrow">Transparência pública</p>
              <h1>Manifestações</h1>
              <p class="text-muted">
                Explore as manifestações publicadas. Dados pessoais são
                preservados.
              </p>
            </header>

            <div data-filters></div>
            <div data-toolbar></div>
            <div class="stack" data-results></div>
            <div data-pagination></div>
          </div>
        </section>
      </main>
      <div data-shell="footer"></div>
    </div>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/features/manifestations/list.js"></script>
  </body>
</html>
